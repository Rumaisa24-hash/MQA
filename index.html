<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="UI/UX QA Application for Design and Implementation comparison" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <title>10Pearls QA | UI/UX Validation</title>
  </head>
  <body>
    <div id="app">
      <div class="glass-container">
        <header>
          <h1>10Pearls QA</h1>
          <p class="subtitle">Validate UI/UX Implementation Against Design</p>
        </header>

        <form id="qa-form">
          <div class="input-group">
            <label for="figma-url">Figma URL</label>
            <input type="url" id="figma-url" placeholder="https://www.figma.com/file/..." required />
          </div>

          <div class="input-group">
            <label for="webpage-url">Webpage URL</label>
            <input type="url" id="webpage-url" placeholder="https://clone.10pearls.com" required />
          </div>

          <div class="input-group">
            <label for="casestudy-url">Case Study URL (Optional)</label>
            <input type="url" id="casestudy-url" placeholder="https://..." />
          </div>

          <div class="input-group">
            <label for="blog-url">Blog URL (Optional)</label>
            <input type="url" id="blog-url" placeholder="https://..." />
          </div>

          <button type="submit" id="start-btn" class="glow-on-hover">
            <span>Start QA</span>
            <svg viewBox="0 0 24 24" fill="none" class="arrow-icon">
                <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </form>

        <div id="loading-overlay" class="hidden">
           <div class="spinner"></div>
           <p>Initializing QA Environment...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
